<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css"/>

        <!--Link fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navigation">
            <h1>To Do List Apps</h1>
            <p>buat rutinitas mu lebih terstruktur</p>
        </nav>
    </header>

    <main>
        <section class="section-group">
            <div class="input-group">

                <div class="input-row">

                <div class="input-fields">
                    <label>Nama Kegiatan</label>
                    <input type="text" id="inputNama" placeholder="masukkan rutinitas anda">
                </div>
                <div class="input-fields">
                    <label>Waktu</label>
                    <input type="time" id="inputWaktu" placeholder="waktu">
                </div>
                </div>
                <button class="btn" id="tombolTambah">Tambah</button>              
            </div>
        </section>

        <section class="list-section">
            <h3>Daftar Rencana</h3>
            <ul id="listTugas"></ul>
        </section>

        <section class="list-section">
            <h3>Rencana Selesai</h3>
            <ul id="listSelesai"></ul>
        </section>


    </main>

    <script src="js/script.js"></script>
</body>
</html>
